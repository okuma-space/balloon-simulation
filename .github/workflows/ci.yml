name: CI

on:
  push:
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/balloon-sim

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest -f tool/Dockerfile .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest

  lint:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull $IMAGE_NAME:latest

      - name: Run ruff inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/balloon-simulation \
            $IMAGE_NAME:latest \
            bash -c "ruff check /balloon-simulation"

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Docker image
        run: docker pull $IMAGE_NAME:latest

      - name: Run pytest with coverage
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/balloon-simulation \
            $IMAGE_NAME:latest \
            bash -c "pytest tests --cov=py --cov-report=term --cov-report=xml"